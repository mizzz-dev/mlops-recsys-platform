name: Publish inference API image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optional image tag. Defaults to the current commit SHA.'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'asia-northeast1' }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'mlops-recsys' }}
  IMAGE_NAME: mlops-recsys-inference-api

jobs:
  publish-image:
    name: Build and publish image
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ github.event_name == 'workflow_dispatch' }}
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image URI
        id: image
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_SHA}"
          fi
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:${TAG}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Validate required configuration
        run: |
          test -n "${GCP_PROJECT_ID}"
          test -n "${GCP_REGION}"
          test -n "${ARTIFACT_REGISTRY_REPOSITORY}"
          test -n "${IMAGE_URI}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build image
        run: docker build -t "${IMAGE_URI}" apps/inference-api

      - name: Push image
        run: docker push "${IMAGE_URI}"

      - name: Print image URI for deploy-staging
        run: echo "Published image: ${IMAGE_URI}"
