name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-test:
    name: Go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Run Go tests
        run: cd apps/inference-api && go test ./...

  python-test:
    name: Python test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run Python tests
        run: PYTHONPATH=ml/src python -m pytest ml/tests

  pipeline-compile:
    name: Pipeline compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile pipeline spec
        run: python pipelines/training/pipeline.py --compile --output artifacts/pipeline.json

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build inference API image
        run: docker build -t mlops-recsys-inference-api:ci apps/inference-api
